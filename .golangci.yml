version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - unconvert
    - bodyclose
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - linters:
          - revive
        text: package-comments
      - linters:
          - revive
        text: unused-parameter

formatters:
  enable:
    - gofmt
