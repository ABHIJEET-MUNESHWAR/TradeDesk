name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (race, coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l internal cmd)" || (gofmt -l internal cmd; exit 1)
      - name: go vet
        run: go vet ./...
      - name: test
        run: go test -race -coverprofile=coverage.out ./...
      - name: coverage
        run: go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tradedesk:ci
